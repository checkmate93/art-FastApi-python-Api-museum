<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Curator AI</title>

<style>
:root { 
    --bg: #0f172a; 
    --card: #1e293b; 
    --accent: #fbbf24; 
    --text: #f8fafc; 
    --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
}

body { 
    font-family: 'Segoe UI', Roboto, sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    padding: 20px; 
    margin: 0; 
    min-height: 100vh; 
}

.card { 
    background: var(--card); 
    padding: clamp(20px, 4vw, 35px); 
    border-radius: clamp(18px, 3vw, 28px); 
    text-align: center; 
    max-width: 800px; 
    width: 100%; 
    box-shadow: var(--shadow); 
    border: 1px solid rgba(255,255,255,0.05);
}

h2 { 
    margin-bottom: 25px; 
    font-weight: 800; 
    font-size: clamp(1.6rem, 2.5vw, 2.2rem);
}

select { 
    width: 100%; 
    padding: 14px; 
    border-radius: 14px; 
    margin-bottom: 20px; 
    background: #0f172a; 
    color: white; 
    border: 2px solid #334155; 
    font-size: clamp(0.9rem, 1vw, 1rem);
}

#art-image { 
    width: 100%; 
    max-height: 60vh;
    object-fit: cover;
    border-radius: 18px; 
    margin: 20px 0; 
    display: none; 
}

.ai-section { 
    background: rgba(15, 23, 42, 0.7); 
    border-left: 5px solid var(--accent); 
    padding: 20px; 
    margin-top: 25px; 
    text-align: left; 
    border-radius: 15px; 
    display: none; 
}

.label { 
    font-size: 0.75rem; 
    color: var(--accent); 
    font-weight: 900; 
    letter-spacing: 2px; 
    display: block; 
    margin-bottom: 10px; 
}

#ai-fact { 
    line-height: 1.8; 
    font-size: clamp(0.95rem, 1.2vw, 1.1rem);
    color: #cbd5e1; 
    white-space: pre-line; 
}

#ai-fact strong {
    color: var(--accent);
}

button { 
    background: var(--accent); 
    color: #0f172a; 
    border: none; 
    padding: clamp(14px, 2vw, 20px);
    border-radius: 50px; 
    cursor: pointer; 
    font-weight: 900; 
    width: 100%; 
    margin-top: 25px; 
}

button:disabled { 
    background: #475569; 
    opacity: 0.6; 
}

.artist-tag { 
    color: var(--accent); 
    margin-top: 15px; 
    display: block; 
}
</style>
</head>

<body>

<div class="card">
    <h2 id="art-title">Curiosity Gallery</h2>
    
    <select id="category-select">
        <option value="Impressionism">🎨 Ιμπρεσιονισμός</option>
        <option value="Renaissance">🏰 Αναγέννηση</option>
        <option value="Ancient Greek Art">🏺 Αρχαία Ελληνική Τέχνη</option>
        <option value="Japanese Art">🌊 Ιαπωνική Τέχνη</option>
        <option value="Surrealism">👁️ Σουρεαλισμός</option>
    </select>

    <img id="art-image">

    <div class="ai-section" id="ai-container">
        <span class="label">AI CURATOR</span>
        <p id="ai-fact"></p>
        <span id="artist-name" class="artist-tag"></span>
    </div>

    <button id="next-btn" onclick="getArt()">ΑΝΑΚΑΛΥΨΗ</button>
</div>

<script>

async function getArt() {
    const btn = document.getElementById('next-btn');
    const img = document.getElementById('art-image');
    const category = document.getElementById('category-select').value;
    const aiContainer = document.getElementById('ai-container');

    btn.disabled = true;
    btn.innerText = "Φόρτωση...";
    aiContainer.style.display = "none";

    try {
        const page = Math.floor(Math.random() * 30) + 1;
        const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${category}&page=${page}&limit=12&fields=id,title,artist_title,image_id`);
        const data = await res.json();

        const validArt = data.data.filter(a => a.image_id);
        const art = validArt[Math.floor(Math.random() * validArt.length)];

        document.getElementById('art-title').innerText = art.title;
        document.getElementById('artist-name').innerText = art.artist_title || "Άγνωστος";

        img.src = `https://www.artic.edu/iiif/2/${art.image_id}/full/800,/0/default.jpg`;
        img.style.display = "block";

        img.onload = () => {
            btn.disabled = false;
            btn.innerText = "ΕΠΟΜΕΝΟ";
            getAIFact(art.title, art.artist_title);
        };

    } catch (e) {
        btn.innerText = "ΞΑΝΑ";
        btn.disabled = false;
    }
}

async function getAIFact(title, artist) {
    const factDiv = document.getElementById('ai-fact');
    const container = document.getElementById('ai-container');

    factDiv.innerText = "Το AI σκέφτεται...";
    container.style.display = "block";

    try {
        // ✅ ΤΩΡΑ ΜΙΛΑΕΙ ΣΤΟ BACKEND ΣΟΥ (Render)
        const response = await fetch("https://art-b2pg.onrender.com/api/groq", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title,
                artist
            })
        });

        const data = await response.json();

        let text = data.choices[0].message.content;

        text = text
            .replace("🎯 Fun Fact:", "<strong>🎯 Fun Fact:</strong><br>")
            .replace("🎨 Ανάλυση:", "<br><br><strong>🎨 Ανάλυση:</strong><br>")
            .replace("🧠 Context:", "<br><br><strong>🧠 Context:</strong><br>");

        factDiv.innerHTML = text;

    } catch (err) {
        factDiv.innerText = "Σφάλμα AI...";
        console.error(err);
    }
}

window.onload = getArt;

</script>

</body>
</html>
