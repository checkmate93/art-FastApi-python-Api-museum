<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Curator AI - TV Edition</title>

<style>
/* =========================================
   1. ΒΑΣΙΚΕΣ ΜΕΤΑΒΛΗΤΕΣ & RESET
========================================= */
:root { 
    --bg: #0f172a; 
    --panel-bg: #1e293b; 
    --accent: #fbbf24; 
    --text: #f8fafc; 
    --text-muted: #cbd5e1;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
    font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    width: 100vw;
    height: 100vh;
    overflow: hidden; 
}

/* =========================================
   2. TV SAFE AREA & LAYOUT
========================================= */
#tv-safe-area {
    padding: 3vh 3vw; 
    width: 100%;
    height: 100%;
}

#main-grid {
    display: flex;
    flex-direction: row; 
    gap: 3vw; 
    height: 100%;
    width: 100%;
}

/* =========================================
   3. ΑΡΙΣΤΕΡΗ ΣΤΗΛΗ (Εικόνα)
========================================= */
.left-panel {
    flex: 6; 
    display: flex;
    flex-direction: column;
    background: var(--panel-bg);
    border-radius: 15px;
    padding: 15px; 
    box-shadow: var(--shadow);
    height: 100%;
}

.image-container {
    flex-grow: 1; 
    min-height: 0; 
    display: flex;
    align-items: center;
    justify-content: center;
}

#art-image { 
    max-width: 100%;
    max-height: 100%; 
    object-fit: contain; 
    border-radius: 8px;
    display: none;
}

#enter-canvas-btn {
    flex-shrink: 0; 
    margin-top: 15px;
    background: rgba(15, 23, 42, 0.8);
    color: white;
    border: 1px solid var(--accent);
    padding: 10px 20px; 
    border-radius: 20px;
    font-size: 18px; 
    cursor: pointer;
    align-self: center; 
}

#enter-canvas-btn:hover { background: var(--accent); color: var(--bg); }

/* =========================================
   4. ΔΕΞΙΑ ΣΤΗΛΗ (Controls)
========================================= */
.right-panel {
    flex: 4; 
    display: flex;
    flex-direction: column;
    gap: 15px;
    height: 100%;
}

select { 
    flex-shrink: 0; 
    width: 100%; 
    padding: 10px 15px; 
    border-radius: 8px; 
    background: #0f172a; 
    color: white; 
    border: 1px solid #334155; 
    font-size: 18px; 
    cursor: pointer;
}

.info-box {
    flex-grow: 1; 
    min-height: 0; 
    background: var(--panel-bg);
    border-radius: 15px;
    padding: 20px;
    overflow-y: auto; 
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
}

/* Custom Scrollbar για TV */
.info-box::-webkit-scrollbar { width: 6px; }
.info-box::-webkit-scrollbar-track { background: transparent; }
.info-box::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

#art-title { 
    font-size: 24px; 
    font-weight: bold; 
    margin-bottom: 5px;
    line-height: 1.2;
}

.artist-name { 
    font-size: 18px; 
    color: var(--accent); 
    margin-bottom: 15px; 
}

#ai-fact { 
    font-size: 20px; 
    line-height: 1.5;
    color: var(--text-muted);
}
#ai-fact strong { color: white; }

.btn-group {
    flex-shrink: 0; 
    display: flex;
    flex-direction: row; 
    gap: 15px;
}

button.control-btn {
    flex: 1; 
    border: none; 
    padding: 15px 5px; 
    border-radius: 10px; 
    font-size: 18px; 
    font-weight: bold;
    cursor: pointer; 
}

#next-btn { background: var(--accent); color: #0f172a; }
#next-btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }

#auto-btn { background: #334155; color: white; border: 1px solid #475569; }
#auto-btn.active { background: #ef4444; border-color: #ef4444; }

/* =========================================
   5. ΛΕΙΤΟΥΡΓΙΑ ΚΑΜΒΑ
========================================= */
#fullscreen-overlay {
    display: none; 
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: black; 
    z-index: 9999;
    align-items: center; justify-content: center;
    padding: 20px;
}
#fullscreen-image { width: 100%; height: 100%; object-fit: contain; }

#fixed-back-btn {
    position: absolute; top: 30px; left: 30px; 
    background: rgba(239, 68, 68, 0.9); color: white;
    padding: 12px 24px; font-size: 18px; font-weight: bold;
    border: none; border-radius: 10px; cursor: pointer;
}
</style>
</head>

<body>

<!-- OVERLAY ΚΑΜΒΑ -->
<div id="fullscreen-overlay">
    <button id="fixed-back-btn" onclick="exitCanvas()">⬅ ΕΠΙΣΤΡΟΦΗ</button>
    <img id="fullscreen-image">
</div>

<div id="tv-safe-area">
    <div id="main-grid">
        
        <!-- ΑΡΙΣΤΕΡΑ -->
        <div class="left-panel">
            <div class="image-container">
                <img id="art-image">
            </div>
            <button id="enter-canvas-btn" onclick="enterCanvas()">🔍 Προβολή σε Καμβά</button>
        </div>

        <!-- ΔΕΞΙΑ -->
        <div class="right-panel">
            <select id="category-select" onchange="getArt()">
                <option value="Impressionism">🎨 Ιμπρεσιονισμός</option>
                <option value="Renaissance">🏰 Αναγέννηση</option>
                <option value="Ancient Greek Art">🏺 Αρχαία Ελληνική Τέχνη</option>
                <option value="Japanese Art">🌊 Ιαπωνική Τέχνη</option>
                <option value="Surrealism">👁️ Σουρεαλισμός</option>
            </select>

            <div class="info-box" id="scrollable-info">
                <h1 id="art-title">Curiosity Gallery</h1>
                <div id="artist-name" class="artist-name">Επιλέξτε...</div>
                <div id="ai-fact">Το AI Curator φορτώνει...</div>
            </div>

            <div class="btn-group">
                <button id="next-btn" class="control-btn" onclick="getArt()">ΕΠΟΜΕΝΟ</button>
                <button id="auto-btn" class="control-btn" onclick="toggleAutoMode()">⏱️ AUTO (1.5λ)</button>
            </div>
        </div>

    </div>
</div>

<script>
/* --- ΛΕΙΤΟΥΡΓΙΑ ΚΑΜΒΑ --- */
function enterCanvas() {
    const mainImg = document.getElementById('art-image');
    document.getElementById('fullscreen-image').src = mainImg.src;
    document.getElementById('fullscreen-overlay').style.display = 'flex';
}
function exitCanvas() { document.getElementById('fullscreen-overlay').style.display = 'none'; }

/* --- AUTO MODE --- */
let autoInterval;
let isAutoMode = false;
function toggleAutoMode() {
    const btn = document.getElementById('auto-btn');
    isAutoMode = !isAutoMode;
    if (isAutoMode) {
        btn.classList.add('active'); btn.innerText = "🛑 ΔΙΑΚΟΠΗ";
        getArt(); autoInterval = setInterval(getArt, 90000); 
    } else {
        btn.classList.remove('active'); btn.innerText = "⏱️ AUTO (1.5λ)";
        clearInterval(autoInterval);
    }
}

/* --- ΜΕΤΑΒΛΗΤΗ ΓΙΑ ΤΟ TYPEWRITER ΕΛΕΓΧΟ --- */
let typingSession = 0; 

/* --- TYPEWRITER & AUTO-SCROLL ΛΟΓΙΚΗ --- */
function typeWriterHTML(element, htmlString, speed = 15) {
    typingSession++; // Νέο session ID
    const currentSession = typingSession; 
    element.innerHTML = "";
    
    const container = document.getElementById('scrollable-info');
    let i = 0;

    function type() {
        // Αν ο χρήστης πάτησε "Επόμενο", η συνεδρία αλλάζει και το γράψιμο σταματάει αμέσως!
        if (currentSession !== typingSession) return;

        if (i < htmlString.length) {
            let char = htmlString.charAt(i);
            
            // Αν βρει HTML tag (π.χ. <strong>) το προσθέτει ολόκληρο κατευθείαν για να μη σπάσει η μορφή
            if (char === '<') {
                let tagEnd = htmlString.indexOf('>', i);
                if (tagEnd !== -1) {
                    element.innerHTML += htmlString.substring(i, tagEnd + 1);
                    i = tagEnd + 1;
                } else {
                    element.innerHTML += char;
                    i++;
                }
            } else {
                element.innerHTML += char;
                i++;
            }

            // Αυτόματο scroll προς τα κάτω καθώς γράφει!
            container.scrollTop = container.scrollHeight;

            setTimeout(type, speed);
        }
    }
    type();
}

/* --- API & ΦΟΡΤΩΣΗ --- */
async function getArt(retryCount = 0) {
    const nextBtn = document.getElementById('next-btn');
    const catSelect = document.getElementById('category-select');
    const img = document.getElementById('art-image');
    const titleEl = document.getElementById('art-title');
    const artistEl = document.getElementById('artist-name');
    const factEl = document.getElementById('ai-fact');

    if (retryCount === 0) {
        typingSession++; // Σταματάει το προηγούμενο γράψιμο αμέσως
        nextBtn.disabled = true; catSelect.disabled = true;
        nextBtn.innerText = "..."; titleEl.innerText = "Αναζήτηση πίνακα..."; factEl.innerText = "";
        exitCanvas(); 
    }

    try {
        const page = Math.floor(Math.random() * 5) + 1;
        const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${catSelect.value}&page=${page}&limit=12&fields=id,title,artist_title,image_id`);
        if (!res.ok) throw new Error("Net Error");
        
        const data = await res.json();
        const validArt = data.data.filter(a => a.image_id);
        if (validArt.length === 0) throw new Error("No Img");
        
        const art = validArt[Math.floor(Math.random() * validArt.length)];

        titleEl.innerText = art.title;
        artistEl.innerText = art.artist_title || "Άγνωστος Καλλιτέχνης";

        await new Promise((resolve, reject) => {
            img.onload = () => resolve(); img.onerror = () => reject(new Error("Img Error"));
            img.src = `https://www.artic.edu/iiif/2/${art.image_id}/full/800,/0/default.jpg`;
        });

        img.style.display = "block";
        getAIFact(art.title, art.artist_title);

        nextBtn.disabled = false; catSelect.disabled = false; nextBtn.innerText = "ΕΠΟΜΕΝΟ";

    } catch (error) {
        if (retryCount < 3) return getArt(retryCount + 1);
        titleEl.innerText = "Αδυναμία φόρτωσης."; artistEl.innerText = "Μουσείο Chicago";
        factEl.innerText = "Δοκιμάστε να πατήσετε 'Επόμενο'.";
        nextBtn.disabled = false; catSelect.disabled = false; nextBtn.innerText = "ΕΠΟΜΕΝΟ";
    }
}

async function getAIFact(title, artist) {
    const factEl = document.getElementById('ai-fact');
    
    // Σταματάμε το typing και γράφουμε στατικά ότι φορτώνει
    typingSession++; 
    factEl.innerHTML = "<em>Ο AI Curator γράφει...</em>";

    try {
        const response = await fetch("https://art-b2pg.onrender.com/api/groq", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ title, artist })
        });
        
        if (!response.ok) throw new Error("AI Error");
        let text = (await response.json()).choices[0].message.content;
        
        // Μορφοποίηση κειμένου
        let formattedText = text.replace("🎯 Fun Fact:", "<strong>🎯 Fun Fact:</strong><br>")
                                .replace("🎨 Ανάλυση:", "<br><br><strong>🎨 Ανάλυση:</strong><br>")
                                .replace("🧠 Context:", "<br><br><strong>🧠 Context:</strong><br>");
        
        // Εκκίνηση Typewriter Effect!
        typeWriterHTML(factEl, formattedText, 15); // 15ms ανά γράμμα είναι ιδανικό για διάβασμα

    } catch {
        factEl.innerText = "Αδυναμία σύνδεσης. Πατήστε Επόμενο!";
    }
}

window.onload = getArt;
</script>

</body>
</html>
