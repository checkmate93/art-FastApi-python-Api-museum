<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Curator AI - TV Edition</title>

<style>
/* --- BASE VARIABLES & SETUP --- */
:root { 
    --bg: #0f172a; 
    --panel-bg: #1e293b; 
    --accent: #fbbf24; 
    --accent-hover: #f59e0b;
    --text: #f8fafc; 
    --text-muted: #cbd5e1;
    --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    --safe-area: 4vmin; 
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body { 
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    font-size: 24px; 
    width: 100vw;
    height: 100vh;
    overflow: hidden; 
}

/* --- MAIN LAYOUT (60/40) --- */
#tv-layout {
    display: flex;
    width: 100vw;
    height: 100vh;
    padding: var(--safe-area);
    gap: 3vw;
    transition: all 0.5s ease-in-out;
}

/* --- LEFT COLUMN (60%) --- */
.left-col {
    width: 60%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    background: radial-gradient(circle, rgba(30,41,59,0.5) 0%, rgba(15,23,42,0) 70%);
    border-radius: 20px;
}

.image-container {
    width: 100%;
    height: 85%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px; 
}

#art-image { 
    width: 100%; 
    height: 100%;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: var(--shadow);
    display: none;
    transition: transform 0.5s ease;
}

#fullscreen-btn {
    position: absolute;
    bottom: 20px;
    background: rgba(15, 23, 42, 0.8);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 15px 30px;
    border-radius: 50px;
    font-size: 20px;
    cursor: pointer;
    backdrop-filter: blur(5px);
    transition: background 0.3s;
}

#fullscreen-btn:hover {
    background: var(--accent);
    color: var(--bg);
}

/* ΝΕΟ: Κουμπί εξόδου από καμβά */
#close-fullscreen-btn {
    display: none;
    position: absolute;
    top: 30px;
    right: 40px;
    background: rgba(239, 68, 68, 0.9);
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 50px;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: var(--shadow);
    z-index: 100;
}

#close-fullscreen-btn:hover {
    background: #dc2626;
}

/* --- RIGHT COLUMN (40%) --- */
.right-col {
    width: 40%;
    display: flex;
    flex-direction: column;
    gap: 20px;
    height: 100%;
}

.info-panel {
    flex-grow: 1;
    background: var(--panel-bg);
    border-radius: 24px;
    padding: 30px;
    border: 1px solid rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    overflow: hidden; 
}

.scroll-area {
    overflow-y: auto;
    padding-right: 15px;
    height: 100%;
}

.scroll-area::-webkit-scrollbar { width: 8px; }
.scroll-area::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
.scroll-area::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
.scroll-area::-webkit-scrollbar-thumb:hover { background: var(--accent); }

#art-title { 
    font-size: 38px; 
    font-weight: 800; 
    line-height: 1.2;
    margin-bottom: 10px;
}

.artist-tag { 
    font-size: 26px;
    color: var(--accent); 
    font-weight: 600;
    margin-bottom: 25px; 
    display: block; 
}

select { 
    width: 100%; 
    padding: 18px; 
    border-radius: 14px; 
    margin-bottom: 25px; 
    background: #0f172a; 
    color: white; 
    border: 2px solid #334155; 
    font-size: 24px;
    cursor: pointer;
}

.ai-section { 
    background: rgba(15, 23, 42, 0.6); 
    border-left: 6px solid var(--accent); 
    padding: 25px; 
    border-radius: 16px; 
    display: none; 
}

.label { 
    font-size: 18px; 
    color: var(--accent); 
    font-weight: 900; 
    letter-spacing: 3px; 
    display: block; 
    margin-bottom: 15px; 
}

#ai-fact { 
    line-height: 1.6; 
    font-size: 24px;
    color: var(--text-muted); 
    white-space: pre-line; 
}

#ai-fact strong { color: white; }

/* Bottom: Action Buttons */
.controls-panel {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

button {
    font-family: inherit;
    border: none; 
    padding: 22px;
    border-radius: 18px; 
    cursor: pointer; 
    font-weight: 900; 
    font-size: 24px;
    width: 100%;
    transition: transform 0.1s, opacity 0.3s;
}

button:active { transform: scale(0.98); }

#next-btn { 
    background: var(--accent); 
    color: #0f172a; 
    box-shadow: 0 10px 15px -3px rgba(251, 191, 36, 0.3);
}

#next-btn:disabled { 
    background: #475569; 
    color: #94a3b8;
    box-shadow: none;
    cursor: not-allowed; 
}

#auto-btn {
    background: #334155;
    color: white;
    border: 2px solid #475569;
}

#auto-btn.active {
    background: #ef4444;
    border-color: #ef4444;
}

/* --- FULLSCREEN MODE --- */
.is-fullscreen .right-col { display: none; }
.is-fullscreen .left-col { width: 100%; background: none; cursor: pointer; }
.is-fullscreen #art-image { width: 95vw; height: 95vh; }
.is-fullscreen #fullscreen-btn { display: none; }
.is-fullscreen #close-fullscreen-btn { display: block; }

</style>
</head>

<body>

<div id="tv-layout">
    <!-- Αριστερή Στήλη: Καμβάς -->
    <!-- Πρόσθεσα onClick στο panel ώστε να βγαίνει πατώντας οπουδήποτε όταν είναι fullscreen -->
    <div class="left-col" id="left-panel" onclick="if(document.getElementById('tv-layout').classList.contains('is-fullscreen')) exitFullscreen()">
        
        <button id="close-fullscreen-btn" onclick="exitFullscreen()">❌ ΕΠΙΣΤΡΟΦΗ</button>

        <div class="image-container">
            <img id="art-image">
        </div>
        <button id="fullscreen-btn" onclick="enterFullscreen(event)">🔍 Προβολή σε Καμβά</button>
    </div>

    <!-- Δεξιά Στήλη: Πληροφορίες & Κουμπιά -->
    <div class="right-col">
        <div class="info-panel">
            <div class="scroll-area">
                <select id="category-select" onchange="getArt()">
                    <option value="Impressionism">🎨 Ιμπρεσιονισμός</option>
                    <option value="Renaissance">🏰 Αναγέννηση</option>
                    <option value="Ancient Greek Art">🏺 Αρχαία Ελληνική Τέχνη</option>
                    <option value="Japanese Art">🌊 Ιαπωνική Τέχνη</option>
                    <option value="Surrealism">👁️ Σουρεαλισμός</option>
                </select>

                <h1 id="art-title">Curiosity Gallery</h1>
                <span id="artist-name" class="artist-tag">Επιλέξτε κατηγορία...</span>
                
                <div class="ai-section" id="ai-container">
                    <span class="label">AI CURATOR</span>
                    <p id="ai-fact"></p>
                </div>
            </div>
        </div>

        <div class="controls-panel">
            <button id="next-btn" onclick="getArt()">ΕΠΟΜΕΝΟ</button>
            <button id="auto-btn" onclick="toggleAutoMode()">⏱️ ΑΥΤΟΜΑΤΗ ΕΝΑΛΛΑΓΗ (3 λεπτά)</button>
        </div>
    </div>
</div>

<script>
// --- FULLSCREEN LOGIC ---
const layout = document.getElementById('tv-layout');

function enterFullscreen(event) {
    event.stopPropagation(); // Σταματάει το click από το να διαβαστεί παραπάνω
    layout.classList.add('is-fullscreen');
}

function exitFullscreen() {
    layout.classList.remove('is-fullscreen');
}

document.addEventListener('keydown', (e) => {
    if (e.key === "Escape") exitFullscreen();
});

// --- AUTO CYCLE LOGIC ---
let autoInterval;
let isAutoMode = false;

function toggleAutoMode() {
    const btn = document.getElementById('auto-btn');
    isAutoMode = !isAutoMode;

    if (isAutoMode) {
        btn.classList.add('active');
        btn.innerText = "🛑 ΔΙΑΚΟΠΗ ΕΝΑΛΛΑΓΗΣ";
        getArt(); 
        autoInterval = setInterval(getArt, 180000); // 3 λεπτά
    } else {
        btn.classList.remove('active');
        btn.innerText = "⏱️ ΑΥΤΟΜΑΤΗ ΕΝΑΛΛΑΓΗ (3 λεπτά)";
        clearInterval(autoInterval);
    }
}

// --- API & DATA LOGIC ---
async function getArt() {
    const btn = document.getElementById('next-btn');
    const img = document.getElementById('art-image');
    const category = document.getElementById('category-select').value;
    const aiContainer = document.getElementById('ai-container');

    btn.disabled = true;
    btn.innerText = "Φόρτωση Έργου...";
    aiContainer.style.display = "none";
    exitFullscreen();

    try {
        const page = Math.floor(Math.random() * 30) + 1;
        const res = await fetch(`https://api.artic.edu/api/v1/artworks/search?q=${category}&page=${page}&limit=12&fields=id,title,artist_title,image_id`);
        const data = await res.json();

        const validArt = data.data.filter(a => a.image_id);
        const art = validArt[Math.floor(Math.random() * validArt.length)];

        document.getElementById('art-title').innerText = art.title;
        document.getElementById('artist-name').innerText = art.artist_title || "Άγνωστος Καλλιτέχνης";

        img.src = `https://www.artic.edu/iiif/2/${art.image_id}/full/800,/0/default.jpg`;
        img.style.display = "block";

        img.onload = () => {
            btn.disabled = false;
            btn.innerText = "ΕΠΟΜΕΝΟ";
            getAIFact(art.title, art.artist_title);
        };

    } catch (e) {
        btn.innerText = "ΞΑΝΑΠΡΟΣΠΑΘΕΙΑ";
        btn.disabled = false;
    }
}

async function getAIFact(title, artist) {
    const factDiv = document.getElementById('ai-fact');
    const container = document.getElementById('ai-container');

    factDiv.innerText = "Ο AI Curator μελετά το έργο...";
    container.style.display = "block";

    try {
        // ΕΔΩ ΜΠΗΚΕ ΤΟ ΔΙΚΟ ΣΟΥ RENDER URL!
        const response = await fetch("https://art-b2pg.onrender.com/api/groq", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ title, artist })
        });

        const data = await response.json();
        let text = data.choices[0].message.content;

        text = text
            .replace("🎯 Fun Fact:", "<strong>🎯 Fun Fact:</strong><br>")
            .replace("🎨 Ανάλυση:", "<br><br><strong>🎨 Ανάλυση:</strong><br>")
            .replace("🧠 Context:", "<br><br><strong>🧠 Context:</strong><br>");

        factDiv.innerHTML = text;

    } catch {
        factDiv.innerText = "Σφάλμα επικοινωνίας με τον AI Curator. (Μήπως αργεί να ξυπνήσει ο server;)";
    }
}

window.onload = getArt;
</script>

</body>
</html>
